<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teachable IdeaSense</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    max-width:900px;
    margin:auto;
    padding:20px;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}

#canvas-container{
    margin-top:20px;
}

canvas{
    border:1px solid #ccc;
    border-radius:10px;
}

.estado{
    margin-top:20px;
    font-size:1.3em;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

</head>

<body>

<h1>🤖 Teachable IdeaSense</h1>

<input
id="modelURL"
placeholder="https://teachablemachine.withgoogle.com/models/xxxxx/">

<br>

<button onclick="cargarModelo()">
Cargar Modelo
</button>

<button onclick="conectarBLE()">
Conectar IdeaBoard
</button>

<div id="canvas-container"></div>

<div class="estado" id="estadoModelo">
Modelo no cargado
</div>

<div class="estado" id="prediccion">
Clase: ---
</div>

<div class="estado" id="estadoBLE">
Bluetooth desconectado
</div>

<script>

let model;
let webcam;
let maxPredictions;

let bleCharacteristic = null;

let ultimaClase = "";
let enviando = false;


//===================================================
// CARGAR MODELO
//===================================================

async function cargarModelo(){

    try{

        const base =
            document.getElementById("modelURL")
            .value.trim();

        if(base===""){
            alert("Debe ingresar una URL");
            return;
        }

        let url = base;

        if(!url.endsWith("/"))
            url += "/";

        const modelURL = url + "model.json";
        const metadataURL = url + "metadata.json";

        document.getElementById("estadoModelo")
            .innerHTML = "Cargando modelo...";

        model = await tmImage.load(
            modelURL,
            metadataURL
        );

        maxPredictions =
            model.getTotalClasses();

        webcam =
            new tmImage.Webcam(
                400,
                300,
                true
            );

        await webcam.setup();

        await webcam.play();

        document
            .getElementById("canvas-container")
            .innerHTML = "";

        document
            .getElementById("canvas-container")
            .appendChild(webcam.canvas);

        document.getElementById("estadoModelo")
            .innerHTML = "✅ Modelo cargado";

        window.requestAnimationFrame(loop);

    }
    catch(error){

        console.error(error);

        document.getElementById("estadoModelo")
            .innerHTML =
            "❌ Error cargando modelo";

        alert(
            "No fue posible cargar el modelo.\n\n" +
            "Revise la consola (F12)."
        );

    }

}


//===================================================
// LOOP PRINCIPAL
//===================================================

async function loop(){

    webcam.update();

    await predecir();

    window.requestAnimationFrame(loop);

}


//===================================================
// PREDICCIÓN
//===================================================

async function predecir(){

    if(!model) return;

    const prediction =
        await model.predict(webcam.canvas);

    let mejorClase = "";
    let mejorProb = 0;

    for(let p of prediction){

        if(p.probability > mejorProb){

            mejorProb = p.probability;
            mejorClase = p.className;

        }

    }

    document.getElementById("prediccion")
        .innerHTML =
        `Clase: <b>${mejorClase}</b><br>
         Confianza:
         ${(mejorProb*100).toFixed(1)}%`;

    // Solo enviar si cambia

    if(
        mejorClase !== ultimaClase &&
        mejorProb > 0.80
    ){

        ultimaClase = mejorClase;

        enviarBLE(mejorClase);

    }

}


//===================================================
// BLUETOOTH
//===================================================

async function conectarBLE(){

    try{

        const device =
            await navigator.bluetooth.requestDevice({

                acceptAllDevices:true,

                optionalServices:[
                    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                ]

            });

        const server =
            await device.gatt.connect();

        const service =
            await server.getPrimaryService(
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            );

        bleCharacteristic =
            await service.getCharacteristic(
                '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
            );

        document.getElementById("estadoBLE")
            .innerHTML =
            "✅ IdeaBoard conectada";

    }

    catch(error){

        console.error(error);

        alert(
            "No se pudo conectar vía Bluetooth"
        );

    }

}


//===================================================
// ENVIAR BLE
//===================================================

async function enviarBLE(texto){

    if(!bleCharacteristic)
        return;

    if(enviando)
        return;

    try{

        enviando = true;

        const encoder =
            new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(texto + "\n")
        );

        console.log("Enviado:", texto);

    }

    catch(error){

        console.log(error);

    }

    enviando = false;

}

</script>

</body>
</html>
