<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teachable IdeaSense</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    max-width:900px;
    margin:auto;
}

#canvas-container{
    margin-top:20px;
}

button{
    padding:10px;
    margin:10px;
}

input{
    width:500px;
    padding:8px;
}

.estado{
    font-size:20px;
    margin:15px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

</head>

<body>

<h1>Teachable IdeaSense</h1>

<input id="modelURL"
placeholder="https://teachablemachine.withgoogle.com/models/xxxxx/">

<button onclick="cargarModelo()">
Cargar Modelo
</button>

<button onclick="conectarBLE()">
Conectar IdeaBoard
</button>

<div id="canvas-container"></div>

<div class="estado" id="prediccion">
Esperando modelo...
</div>

<div class="estado" id="ble">
Bluetooth desconectado
</div>

<script>

let model;
let webcam;
let dispositivo;
let caracteristica;

let ultimaClase="";

async function cargarModelo(){

    try{

        const base=document.getElementById("modelURL").value;

        const modelURL=base+"model.json";
        const metadataURL=base+"metadata.json";

        model=await tmImage.load(modelURL,metadataURL);

        webcam=new tmImage.Webcam(400,300,true);

        await webcam.setup();
        await webcam.play();

        document
            .getElementById("canvas-container")
            .appendChild(webcam.canvas);

        loop();

    }catch(e){

        alert("No se pudo cargar el modelo");

        console.log(e);

    }

}

async function loop(){

    webcam.update();

    const predicciones=
        await model.predict(webcam.canvas);

    let mejor="";
    let score=0;

    for(let p of predicciones){

        if(p.probability>score){

            mejor=p.className;
            score=p.probability;

        }

    }

    document.getElementById("prediccion").innerHTML=
        `Clase: ${mejor}<br>
        Confianza: ${(score*100).toFixed(1)} %`;

    if(mejor!==ultimaClase){

        ultimaClase=mejor;

        enviarBLE(mejor);

    }

    requestAnimationFrame(loop);

}

async function conectarBLE(){

    try{

        dispositivo=
            await navigator.bluetooth.requestDevice({

                acceptAllDevices:true,

                optionalServices:[
                    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                ]

            });

        const servidor=
            await dispositivo.gatt.connect();

        const servicio=
            await servidor.getPrimaryService(
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            );

        caracteristica=
            await servicio.getCharacteristic(
                '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
            );

        document.getElementById("ble").innerHTML=
            "Bluetooth conectado";

    }

    catch(e){

        console.log(e);

        alert("No fue posible conectar");

    }

}

async function enviarBLE(texto){

    if(!caracteristica)
        return;

    try{

        let encoder=new TextEncoder();

        await caracteristica.writeValue(
            encoder.encode(texto+"\n")
        );

    }

    catch(e){

        console.log(e);

    }

}

</script>

</body>
</html>
