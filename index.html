<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable IdeaSense</title>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;
            min-height: 100vh;

            font-family: 'Poppins', sans-serif;

            background:
                linear-gradient(135deg,
                    #0f172a,
                    #1e293b,
                    #2563eb);

            color: white;
        }

        .container {

            max-width: 1200px;
            margin: auto;
            padding: 30px;

        }

        .hero {

            text-align: center;
            margin-bottom: 30px;

        }

        .hero h1 {

            font-size: 3rem;
            margin-bottom: 10px;

        }

        .hero p {

            opacity: .8;

        }

        .grid {

            display: grid;
            gap: 25px;

            grid-template-columns:
                repeat(auto-fit, minmax(350px, 1fr));

        }

        .card {

            background: rgba(255, 255, 255, .1);

            backdrop-filter: blur(15px);

            border-radius: 25px;

            padding: 25px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .2);

        }

        h2 {
            margin-top: 0;
        }

        input {

            width: 100%;
            padding: 15px;

            border: none;

            border-radius: 15px;

            font-size: 16px;

            margin-top: 10px;
        }

        button {

            margin-top: 15px;

            padding: 15px 25px;

            border: none;

            border-radius: 15px;

            background: white;

            color: #2563eb;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: .3s;
        }

        button:hover {

            transform: translateY(-3px);

        }

        #webcam-container {

            display: flex;
            justify-content: center;
            margin-top: 15px;

        }

        canvas {

            border-radius: 20px;
            max-width: 100%;

        }

        .prediction {

            text-align: center;
            margin-top: 20px;

        }

        .emoji {

            font-size: 5rem;

        }

        .class-name {

            font-size: 2.2rem;
            font-weight: bold;

        }

        .confidence {

            font-size: 1.3rem;
            opacity: .8;

        }

        .status {

            margin-top: 15px;
            font-size: 1.1rem;
        }

        .dot {

            display: inline-block;

            width: 12px;
            height: 12px;

            border-radius: 50%;
            margin-right: 10px;

            background: orange;

        }

        .green {
            background: #00e676;
        }

        .red {
            background: #ff5252;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="hero">

            <h1>🤖 Teachable IdeaSense</h1>

            <p>
                Entrena un modelo con Teachable Machine y llévalo al mundo físico.
            </p>

        </div>

        <div class="grid">

            <div class="card">

                <h2>📦 Modelo</h2>

                <input id="modelURL"
                    value="https://teachablemachine.withgoogle.com/models/8PFBVe19l/"
                    placeholder="Pega aquí la URL del modelo">

                <button onclick="cargarModelo()">
                    Cargar Modelo
                </button>

                <div class="status">
                    <span id="modelDot" class="dot"></span>
                    <span id="modelStatus">Modelo no cargado</span>
                </div>

            </div>

            <div class="card">

                <h2>🔵 IdeaBoard</h2>

                <button onclick="conectarBLE()">
                    Conectar Bluetooth
                </button>

                <div class="status">
                    <span id="bleDot" class="dot"></span>
                    <span id="bleStatus">Desconectado</span>
                </div>

            </div>

        </div>

        <div class="card" style="margin-top:25px;">

            <h2>📷 Cámara</h2>

            <div id="webcam-container"></div>

        </div>

        <div class="card prediction" style="margin-top:25px;">

            <div class="emoji">🎯</div>

            <div class="class-name" id="predictionClass">
                ---
            </div>

            <div class="confidence" id="predictionConfidence">
                0%
            </div>

        </div>

    </div>

    <script>

        console.log("tmImage:", tmImage);

        let model;
        let webcam;
        let bleCharacteristic;

        let ultimaClase = "";

        async function cargarModelo() {

            try {

                let baseURL =
                    document.getElementById("modelURL")
                        .value.trim();

                baseURL = baseURL.replace(/\/+$/, '');

                const modelURL = baseURL + "/model.json";
                const metadataURL = baseURL + "/metadata.json";

                console.log("Modelo:", modelURL);
                console.log("Metadata:", metadataURL);

                model =
                    await tmImage.load(
                        modelURL,
                        metadataURL
                    );

                webcam =
                    new tmImage.Webcam(
                        400,
                        300,
                        true
                    );

                await webcam.setup();
                await webcam.play();

                const contenedor =
                    document.getElementById(
                        "webcam-container"
                    );

                contenedor.innerHTML = "";
                contenedor.appendChild(
                    webcam.canvas
                );

                document.getElementById(
                    "modelStatus"
                ).innerHTML =
                    "Modelo cargado";

                document.getElementById(
                    "modelDot"
                ).classList.remove("red");

                document.getElementById(
                    "modelDot"
                ).classList.add("green");

                window.requestAnimationFrame(loop);

            }

            catch (error) {

                console.error(error);

                document.getElementById(
                    "modelStatus"
                ).innerHTML =
                    "Error cargando modelo";

                document.getElementById(
                    "modelDot"
                ).classList.remove("green");

                document.getElementById(
                    "modelDot"
                ).classList.add("red");

                alert(
                    "Error cargando modelo:\n\n" +
                    error.message
                );

            }

        }

        async function loop() {

            if (!model || !webcam)
                return;

            webcam.update();

            const prediction =
                await model.predict(
                    webcam.canvas
                );

            let mejor = "";
            let prob = 0;

            prediction.forEach(p => {

                if (p.probability > prob) {

                    prob = p.probability;
                    mejor = p.className;

                }

            });

            document.getElementById(
                "predictionClass"
            ).innerHTML = mejor;

            document.getElementById(
                "predictionConfidence"
            ).innerHTML =
                (prob * 100).toFixed(1) + "%";

            if (
                mejor !== ultimaClase &&
                prob > 0.80
            ) {

                ultimaClase = mejor;

                enviarBLE(mejor);

            }

            requestAnimationFrame(loop);

        }

        async function conectarBLE() {

            try {

                const device =
                    await navigator.bluetooth.requestDevice({

                        acceptAllDevices: true,

                        optionalServices: [
                            '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                        ]

                    });

                const server =
                    await device.gatt.connect();

                const service =
                    await server.getPrimaryService(
                        '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                    );

                bleCharacteristic =
                    await service.getCharacteristic(
                        '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
                    );

                document.getElementById(
                    "bleStatus"
                ).innerHTML =
                    "IdeaBoard conectada";

                document.getElementById(
                    "bleDot"
                ).classList.add("green");

            }

            catch (error) {

                console.error(error);

                document.getElementById(
                    "bleStatus"
                ).innerHTML =
                    "Error Bluetooth";

                document.getElementById(
                    "bleDot"
                ).classList.add("red");

            }

        }

        async function enviarBLE(texto) {

            if (!bleCharacteristic)
                return;

            try {

                const encoder =
                    new TextEncoder();

                await bleCharacteristic.writeValue(
                    encoder.encode(texto + "\n")
                );

                console.log("BLE:", texto);

            }

            catch (error) {

                console.log(error);

            }

        }

    </script>

</body>

</html>
