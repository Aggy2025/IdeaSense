<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable IdeaSense</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            opacity: .8;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255,255,255,.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,.2);
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            background: white;
            color: #2563eb;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
        }

        #webcam-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        canvas {
            border-radius: 20px;
            max-width: 100%;
        }

        .prediction {
            text-align: center;
        }

        .prediction h2 {
            font-size: 3rem;
            margin: 10px 0;
        }

        .confidence {
            font-size: 1.4rem;
            opacity: .8;
        }

        .status {
            margin-top: 15px;
            font-size: 1.1rem;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🤖 Teachable IdeaSense</h1>

        <p class="subtitle">
            Conecta Teachable Machine con tu IdeaBoard
        </p>

        <div class="card">

            <h2>📦 Modelo</h2>

            <input id="modelURL"
                value="https://teachablemachine.withgoogle.com/models/8PFBVe19l/"
                placeholder="Pega aquí la URL del modelo">

            <button onclick="cargarModelo()">
                Cargar Modelo
            </button>

            <div class="status" id="modelStatus">
                Modelo no cargado
            </div>

        </div>

        <div class="card">

            <h2>🔵 Bluetooth</h2>

            <button onclick="conectarBLE()">
                Conectar IdeaBoard
            </button>

            <div class="status" id="bleStatus">
                Desconectado
            </div>

        </div>

        <div class="card">

            <h2>📷 Cámara</h2>

            <div id="webcam-container"></div>

        </div>

        <div class="card prediction">

            <h2 id="predictionClass">---</h2>

            <div class="confidence" id="predictionConfidence">
                0%
            </div>

        </div>

    </div>

    <script>

        let model;
        let webcam;
        let bleCharacteristic = null;
        let ultimaClase = "";

        async function cargarModelo() {

            try {

                document.getElementById("modelStatus").innerHTML =
                    "Cargando modelo...";

                let url =
                    document.getElementById("modelURL")
                    .value
                    .trim();

                if (!url.endsWith("/"))
                    url += "/";

                const modelURL = url + "model.json";
                const metadataURL = url + "metadata.json";

                console.log(modelURL);
                console.log(metadataURL);

                model = await tmImage.load(
                    modelURL,
                    metadataURL
                );

                webcam = new tmImage.Webcam(
                    400,
                    300,
                    true
                );

                await webcam.setup();
                await webcam.play();

                const contenedor =
                    document.getElementById(
                        "webcam-container"
                    );

                contenedor.innerHTML = "";
                contenedor.appendChild(
                    webcam.canvas
                );

                document.getElementById(
                    "modelStatus"
                ).innerHTML =
                    "✅ Modelo cargado correctamente";

                window.requestAnimationFrame(loop);

            }

            catch (error) {

                console.error(error);

                document.getElementById(
                    "modelStatus"
                ).innerHTML =
                    "❌ Error cargando modelo";

                alert(
                    "Error cargando modelo:\n\n" +
                    error.message
                );
            }

        }

        async function loop() {

            if (!model || !webcam)
                return;

            webcam.update();

            const prediction =
                await model.predict(
                    webcam.canvas
                );

            let mejorClase = "";
            let mejorProb = 0;

            prediction.forEach(p => {

                if (p.probability > mejorProb) {

                    mejorProb = p.probability;
                    mejorClase = p.className;

                }

            });

            document.getElementById(
                "predictionClass"
            ).innerHTML = mejorClase;

            document.getElementById(
                "predictionConfidence"
            ).innerHTML =
                (mejorProb * 100).toFixed(1) + "%";

            if (
                mejorClase !== ultimaClase &&
                mejorProb > 0.8
            ) {

                ultimaClase = mejorClase;

                enviarBLE(mejorClase);

            }

            window.requestAnimationFrame(loop);

        }

        async function conectarBLE() {

            try {

                const device =
                    await navigator.bluetooth.requestDevice({

                        acceptAllDevices: true,

                        optionalServices: [
                            '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                        ]

                    });

                const server =
                    await device.gatt.connect();

                const service =
                    await server.getPrimaryService(
                        '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                    );

                bleCharacteristic =
                    await service.getCharacteristic(
                        '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
                    );

                document.getElementById(
                    "bleStatus"
                ).innerHTML =
                    "✅ IdeaBoard conectada";

            }

            catch (error) {

                console.error(error);

                document.getElementById(
                    "bleStatus"
                ).innerHTML =
                    "❌ Error Bluetooth";

            }

        }

        async function enviarBLE(texto) {

            if (!bleCharacteristic)
                return;

            try {

                const encoder = new TextEncoder();

                await bleCharacteristic.writeValue(
                    encoder.encode(texto + "\n")
                );

                console.log("BLE:", texto);

            }

            catch (error) {

                console.log(error);

            }

        }

    </script>

</body>

</html>
