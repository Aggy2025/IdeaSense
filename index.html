<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable IdeaSense</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            text-align: center;
            padding: 20px;
        }

        h1{
            color:#333;
        }

        input{
            width:80%;
            max-width:600px;
            padding:10px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            margin:10px;
            font-size:16px;
            cursor:pointer;
        }

        #webcam-container{
            margin-top:20px;
        }

        canvas{
            border:1px solid #ccc;
            border-radius:10px;
        }

        .card{
            border:1px solid #ddd;
            border-radius:10px;
            padding:15px;
            margin-top:15px;
        }

    </style>

</head>

<body>

<h1>🤖 Teachable IdeaSense</h1>

<p>Pega la URL del modelo exportado desde Teachable Machine</p>

<input
    id="modelURL"
    value="https://teachablemachine.withgoogle.com/models/8PFBVe19l/"
>

<br>

<button onclick="cargarModelo()">
    Cargar Modelo
</button>

<button onclick="conectarBLE()">
    Conectar IdeaBoard
</button>

<div class="card">
    <h3>Estado del modelo</h3>
    <div id="estadoModelo">
        Modelo no cargado
    </div>
</div>

<div id="webcam-container"></div>

<div class="card">
    <h3>Predicción</h3>
    <div id="resultado">
        ---
    </div>
</div>

<div class="card">
    <h3>Bluetooth</h3>
    <div id="estadoBLE">
        Desconectado
    </div>
</div>

<script>

let model;
let webcam;
let bleCharacteristic = null;

let ultimaClase = "";


//==================================================
// CARGAR MODELO
//==================================================

async function cargarModelo(){

    try{

        document.getElementById("estadoModelo").innerHTML =
            "Cargando modelo...";

        let baseURL =
            document.getElementById("modelURL")
            .value
            .trim();

        // Limpia barras finales extra
        baseURL = baseURL.replace(/\/+$/, "");

        const modelURL = baseURL + "/model.json";
        const metadataURL = baseURL + "/metadata.json";

        console.log(modelURL);
        console.log(metadataURL);

        model = await tmImage.load(
            modelURL,
            metadataURL
        );

        document.getElementById("estadoModelo").innerHTML =
            "✅ Modelo cargado correctamente";

        if(webcam){
            await webcam.stop();
        }

        webcam = new tmImage.Webcam(400, 300, true);

        await webcam.setup();
        await webcam.play();

        const contenedor =
            document.getElementById("webcam-container");

        contenedor.innerHTML = "";
        contenedor.appendChild(webcam.canvas);

        requestAnimationFrame(loop);

    }

    catch(error){

        console.error(error);

        document.getElementById("estadoModelo").innerHTML =
            "❌ Error cargando modelo";

        alert(
            "Error:\n\n" +
            error.message +
            "\n\nRevise la consola (F12)"
        );
    }

}


//==================================================
// LOOP PRINCIPAL
//==================================================

async function loop(){

    if(!webcam || !model)
        return;

    webcam.update();

    const prediction =
        await model.predict(webcam.canvas);

    let mejorClase = "";
    let mejorProb = 0;

    for(let p of prediction){

        if(p.probability > mejorProb){

            mejorProb = p.probability;
            mejorClase = p.className;

        }
    }

    document.getElementById("resultado").innerHTML =
        `
        Clase: <b>${mejorClase}</b><br>
        Confianza: ${(mejorProb*100).toFixed(1)} %
        `;

    if(
        mejorClase !== ultimaClase &&
        mejorProb > 0.80
    ){

        ultimaClase = mejorClase;

        enviarBLE(mejorClase);
    }

    requestAnimationFrame(loop);
}



//==================================================
// CONECTAR BLUETOOTH
//==================================================

async function conectarBLE(){

    if(!navigator.bluetooth){

        alert(
            "Este navegador no soporta Web Bluetooth.\n\nUsa Chrome o Edge."
        );

        return;
    }

    try{

        const device =
            await navigator.bluetooth.requestDevice({

                acceptAllDevices:true,

                optionalServices:[
                    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                ]

            });

        const server =
            await device.gatt.connect();

        const service =
            await server.getPrimaryService(
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            );

        bleCharacteristic =
            await service.getCharacteristic(
                '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
            );

        document.getElementById("estadoBLE").innerHTML =
            "✅ IdeaBoard conectada";

    }

    catch(error){

        console.error(error);

        document.getElementById("estadoBLE").innerHTML =
            "❌ Error Bluetooth";

        alert(error.message);
    }

}



//==================================================
// ENVIAR DATOS BLE
//==================================================

async function enviarBLE(texto){

    if(!bleCharacteristic)
        return;

    try{

        const encoder = new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(texto + "\n")
        );

        console.log("BLE:", texto);

    }

    catch(error){

        console.log(error);
    }

}

</script>

</body>
</html>
